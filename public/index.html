        <div class="header-search">
            <div class="container">

                    <input type="text" id="searchInput" placeholder="Search for products, categories, or brands..." />
                    <button class="search-btn" aria-label="Search">

    <main class="container">

        <div class="date-header">
            <h2 id="todayDeals">Today's Deals</h2>

        <!-- Category Navigation with Filters -->
        <div class="category-nav-wrapper">
            <div class="category-nav">
                <button class="category-tab active" data-category="all">All Deals</button>
                <button class="category-tab" data-category="Electronics">Electronics</button>
                <button class="category-tab" data-category="Home & Kitchen">Home & Kitchen</button>
                <button class="category-tab" data-category="Fashion">Fashion</button>
                <button class="category-tab" data-category="Beauty">Beauty</button>
                <button class="category-tab" data-category="Sports & Outdoors">Sports & Outdoors</button>
                <button class="category-tab" data-category="Toys & Games">Toys & Games</button>
                <button class="category-tab" data-category="Books">Books</button>
                <button class="filter-btn" id="priceFilterBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="4" y1="21" x2="4" y2="14"></line>
                        <line x1="4" y1="10" x2="4" y2="3"></line>

            </div>
            <div id="statsBar" class="stats-info">
                <span id="dealsCount">Loading deals...</span>
            </div>
        </div>

        <!-- Price Filter Dropdown (Hidden by default) -->
        <div class="price-filter-dropdown" id="priceFilterDropdown">
            <h3>Filter by Price</h3>
            <div class="price-options">
                <button class="price-option active" data-price="all">All Prices</button>
                <button class="price-option" data-price="0-25">Under $25</button>
                <button class="price-option" data-price="25-50">$25 - $50</button>
                <button class="price-option" data-price="50-100">$50 - $100</button>
            </div>
        </div>

        <div id="dealsGrid" class="deals-grid">
            <!-- Deals will be loaded here -->
        </div>
    </main>

    <footer>

        <p>Made with ❤️ by <a href="https://instagram.com/amazingdeals_17" target="_blank">@amazingdeals_17</a></p>

    <div class="scroll-top" id="scrollTop">
