name: Daily Deals Scraper

on:
  schedule:
    # Runs every day at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

# Prevent concurrent workflow runs to avoid duplicate posts
concurrency:
  group: instagram-posting
  cancel-in-progress: false

jobs:
  scrape-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scrape

      - name: Post deals to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: node scripts/post-instagram.js
        continue-on-error: true

      - name: Sync posted.json with Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: node scripts/sync-posted.js

      - name: Commit deals.json and posted.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/deals.json data/posted.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update deals and posted - $(date +%Y-%m-%d)" && git push)
